<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تسجيل الدخول - OTMAN BOT MANAGER</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #00d4ff;
            --primary-glow: rgba(0, 212, 255, 0.6);
            --bg: #020305;
            --card-bg: rgba(10, 15, 25, 0.85);
            --text: #ffffff;
            --text-muted: #94a3b8;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* منع التحرك لليمين أو اليسار نهائياً */
            position: fixed; /* تثبيت الصفحة لمنع السحب العشوائي */
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Luxury Animated Background */
        .animated-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #020305 100%);
            z-index: -2;
        }

        .glow-orb {
            position: absolute;
            width: 300px; height: 300px;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(60px);
            z-index: -1;
            animation: move 15s infinite alternate ease-in-out;
            pointer-events: none; /* لضمان عدم تداخلها مع اللمس */
        }

        .glow-orb-1 { top: -50px; left: -50px; background: radial-gradient(circle, rgba(0, 212, 255, 0.15) 0%, transparent 70%); }
        .glow-orb-2 { bottom: -50px; right: -50px; background: radial-gradient(circle, rgba(0, 136, 255, 0.15) 0%, transparent 70%); }

        @keyframes move {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 30px) scale(1.1); }
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            z-index: 10;
        }

        .login-card {
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 30px;
            border: 1px solid rgba(0, 212, 255, 0.15);
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
        }

        .logo-box {
            margin-bottom: 30px;
        }

        .logo-text {
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, #00d4ff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
        }

        .tagline {
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            margin-top: 5px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }

        .input-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 13px;
            font-weight: 700;
            color: var(--primary);
        }

        .input-group input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            color: #fff;
            font-family: 'Tajawal', sans-serif;
            font-size: 15px;
            transition: all 0.3s;
            text-align: right;
        }

        .input-group input:focus {
            border-color: var(--primary);
            outline: none;
            background: rgba(0, 212, 255, 0.05);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            margin-top: 10px;
            background: linear-gradient(135deg, #00d4ff 0%, #0088ff 100%);
            border: none;
            border-radius: 15px;
            color: #000;
            font-size: 17px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Tajawal', sans-serif;
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 212, 255, 0.3);
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #475569;
        }

        .footer span { color: var(--primary); }

        /* SweetAlert Styling */
        .swal2-popup {
            border-radius: 25px !important;
            background: #0f172a !important;
            color: #fff !important;
            border: 1px solid rgba(0, 212, 255, 0.2) !important;
        }
        .swal2-title { color: #fff !important; font-family: 'Tajawal' !important; font-weight: 800 !important; }
        .swal2-confirm { background: linear-gradient(135deg, #00d4ff 0%, #0088ff 100%) !important; color: #000 !important; border-radius: 12px !important; font-weight: 900 !important; }

    </style>
</head>
<body>
    <div class="animated-bg"></div>
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>
    
    <div class="login-container">
        <div class="login-card">
            <div class="logo-box">
                <h1 class="logo-text">OTMAN</h1>
                <p class="tagline">نظام إدارة البوتات الذكي</p>
            </div>
            
            <div class="input-group">
                <label>👤 اسم المستخدم</label>
                <input type="text" id="username" placeholder="أدخل حسابك">
            </div>
            
            <div class="input-group">
                <label>🔒 كلمة المرور</label>
                <input type="password" id="password" placeholder="أدخل الرمز السري">
            </div>
            
            <button class="login-btn" onclick="login()" id="loginBtn">تسجيل الدخول</button>
            
            <div class="footer">
                جميع الحقوق محفوظة <span>OTMAN BOT ©2026</span>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        async function login() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            const btn = document.getElementById('loginBtn');
            
            if (!u || !p) {
                return Swal.fire({ icon: 'warning', title: 'تنبيه', text: 'يرجى إدخال جميع البيانات!' });
            }
            
            btn.disabled = true;
            btn.innerText = 'جاري التحقق...';
            
            try {
                const r = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                
                // التعامل مع حالة الصيانة (503 Service Unavailable)
                if (r.status === 503) {
                    const data = await r.json();
                    if (data.maintenance) {
                        Swal.fire({ icon: 'info', title: 'وضع الصيانة', text: data.message || 'الموقع في وضع الصيانة حالياً' }).then(() => {
                            window.location.href = '/maintenance.html';
                        });
                        btn.disabled = false;
                        btn.innerText = 'تسجيل الدخول';
                        return;
                    }
                }

                const data = await r.json();
                
                if (data.success) {
                    Swal.fire({
                        icon: 'success',
                        title: 'تم تسجيل الدخول!',
                        text: 'أهلاً بك مجدداً 🚀',
                        showConfirmButton: false,
                        timer: 1500
                    }).then(() => {
                        window.location.href = '/';
                    });
                } else {
                    Swal.fire({ icon: 'error', title: 'فشل الدخول', text: data.message });
                    btn.disabled = false;
                    btn.innerText = 'تسجيل الدخول';
                }
            } catch (e) {
                Swal.fire({ icon: 'error', title: 'خطأ', text: 'حدث خطأ في الاتصال بالسيرفر' });
                btn.disabled = false;
                btn.innerText = 'تسجيل الدخول';
            }
        }

        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
    </script>

</body>
</html>
