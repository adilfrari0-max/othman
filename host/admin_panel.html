<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة الأدمن الملكية - OTMAN BOT MANAGER</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --primary: #FFD700;
      --gold: #FFD700;
      --gold-dark: #FFA500;
      --gradient: linear-gradient(135deg, #FFD700 0%, #FFA500 50%, #FF8C00 100%);
      --bg: #05060a;
      --card-bg: rgba(12, 17, 29, 0.9);
      --text: #ffffff;
      --text-muted: #a0aec0;
      --success: #00ff88;
      --error: #ff5555;
      --warning: #ffaa00;
    }
    
    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 50% 50%, #101827 0%, #05060a 100%);
      z-index: -2;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 20px;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(15px);
      border-bottom: 3px solid var(--gold);
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 5px 30px rgba(255, 215, 0, 0.1);
    }
    
    .logo {
      font-size: 20px;
      font-weight: 900;
      background: var(--gradient);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 1px;
    }

    .admin-badge {
      background: var(--gradient);
      color: #000;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 900;
      font-size: 10px;
      text-transform: uppercase;
      display: none;
    }
    
    @media (min-width: 768px) {
      .logo { font-size: 26px; }
      .admin-badge { display: block; }
      .topbar { padding: 20px 30px; }
    }

    .logout-btn {
      background: rgba(255, 85, 85, 0.1);
      border: 1px solid var(--error);
      color: var(--error);
      padding: 6px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      transition: 0.3s;
      font-size: 12px;
    }
    .logout-btn:hover { background: var(--error); color: #fff; }
    
    .container { width: 100%; max-width: 1400px; margin: 20px auto; padding: 0 15px; }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-bottom: 30px;
    }

    @media (min-width: 992px) {
      .stats-grid { grid-template-columns: repeat(4, 1fr); gap: 25px; margin-bottom: 45px; }
    }

    .stat-card {
      background: var(--card-bg);
      border-radius: 15px;
      padding: 15px;
      border: 1px solid rgba(255, 215, 0, 0.1);
      text-align: center;
      transition: 0.3s;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }
    .stat-card:hover { border-color: var(--gold); transform: translateY(-5px); }

    .stat-label { color: var(--text-muted); font-size: 0.75rem; font-weight: 600; margin-bottom: 5px; text-transform: uppercase; }
    .stat-value { font-size: 1.2rem; font-weight: 900; color: var(--gold); }

    @media (min-width: 768px) {
      .stat-card { padding: 30px; border-radius: 20px; }
      .stat-label { font-size: 0.9rem; margin-bottom: 10px; }
      .stat-value { font-size: 2.2rem; }
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 1100px) {
      .main-grid { grid-template-columns: 1fr 1.5fr; gap: 30px; }
    }

    .card {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 20px;
      border: 1px solid rgba(255, 215, 0, 0.1);
      margin-bottom: 20px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
    }

    @media (min-width: 768px) {
      .card { border-radius: 24px; padding: 35px; margin-bottom: 30px; }
    }

    .card-title { font-size: 1.3rem; font-weight: 800; color: var(--gold); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 8px; color: var(--text); font-weight: 600; font-size: 0.85rem; }
    .form-group input {
      width: 100%;
      padding: 12px 15px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: #fff;
      font-family: 'Tajawal', sans-serif;
      transition: 0.3s;
      font-size: 14px;
    }
    .form-group input:focus { border-color: var(--gold); outline: none; background: rgba(255, 215, 0, 0.05); }
    
    .btn { 
      padding: 12px 20px; 
      border: none; 
      border-radius: 12px; 
      font-weight: 800; 
      cursor: pointer; 
      transition: 0.3s; 
      font-family: 'Tajawal', sans-serif; 
      font-size: 0.9rem; 
    }
    .btn-gold { background: var(--gradient); color: #000; width: 100%; }
    .btn-gold:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(255, 215, 0, 0.3); }
    
    .users-list { margin-top: 15px; }
    .user-item { 
      display: flex; 
      flex-direction: column;
      gap: 15px;
      padding: 15px; 
      background: rgba(0, 0, 0, 0.3); 
      border-radius: 15px; 
      margin-bottom: 12px; 
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: 0.3s;
    }

    @media (min-width: 600px) {
      .user-item { flex-direction: row; justify-content: space-between; align-items: center; padding: 20px; border-radius: 18px; margin-bottom: 15px; }
    }

    .user-item:hover { border-color: var(--gold); background: rgba(255, 215, 0, 0.05); }
    
    .user-name { font-weight: 800; color: #fff; font-size: 1rem; }
    .user-meta { font-size: 0.8rem; color: var(--text-muted); margin-top: 5px; }

    .action-group { display: flex; gap: 8px; width: 100%; }
    @media (min-width: 600px) { .action-group { width: auto; } }

    .btn-action { flex: 1; padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #fff; cursor: pointer; transition: 0.3s; font-weight: 600; font-family: 'Tajawal'; font-size: 12px; }
    .btn-action:hover { background: var(--gold); color: #000; border-color: var(--gold); }
    .btn-action.danger:hover { background: var(--error); color: #fff; border-color: var(--error); }

    /* Modal */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; backdrop-filter: blur(15px); overflow-y: auto; padding: 20px; }
    .modal-content { width: 100%; max-width: 550px; margin: 5vh auto; background: var(--card-bg); padding: 30px; border-radius: 25px; border: 1px solid var(--gold); position: relative; }
    .close-btn { position: absolute; top: 15px; left: 15px; cursor: pointer; font-size: 1.3rem; color: var(--text-muted); }

    /* SweetAlert Custom Style */
    .swal2-popup { border-radius: 24px !important; background: #0c111d !important; color: #fff !important; border: 1px solid var(--gold) !important; width: 90% !important; max-width: 450px !important; }
    .swal2-title { color: #fff !important; font-family: 'Tajawal' !important; font-size: 1.2rem !important; }
    .swal2-confirm { background: var(--gradient) !important; color: #000 !important; border-radius: 12px !important; font-weight: 800 !important; }

  </style>
  <script>
    // فحص وضع الصيانة فوراً عند تحميل الصفحة (للأدمن فقط)
    (async function checkMaintenanceForAdmin() {
      try {
        const res = await fetch('/api/maintenance/info', { cache: 'no-store' });
        const data = await res.json();
        
        if (data.enabled) {
          // الصيانة مفعلة، تحديث الواجهة
          console.log('Maintenance mode is active');
        }
      } catch (err) {
        console.error('Error checking maintenance:', err);
      }
    })();
  </script>

  </head>
<body>
  <header class="topbar">
    <div style="display: flex; align-items: center; gap: 10px;">
      <div class="logo">oTman Admin</div>
      <div class="admin-badge">⭐ نظام الإدارة الملكي</div>
    </div>
    <div style="display: flex; gap: 8px; align-items: center;">
        <button class="btn-action" style="padding: 6px 10px;" onclick="window.location.href='/'">🏠 الرئيسية</button>
        <button class="logout-btn" onclick="logout()">خروج</button>
    </div>
  </header>

  <div class="container">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">المستخدمين</div><div class="stat-value" id="totalUsers">0</div></div>
      <div class="stat-card"><div class="stat-label">السيرفرات</div><div class="stat-value" id="runningServers">0</div></div>
      <div class="stat-card"><div class="stat-label">التخزين</div><div class="stat-value" id="storageMB">0 MB</div></div>
      <div class="stat-card"><div class="stat-label">المعالج</div><div class="stat-value" id="cpuUsage">0%</div></div>
    </div>


    <div class="card" style="grid-column: span 2; margin-bottom: 20px;">
      <div class="card-title">🔧 وضع الصيانة</div>
      <p style="color: var(--text-muted); margin-bottom: 15px; font-size: 0.9rem;">تفعيل وضع الصيانة لإيقاف جميع البوتات وتسجيل خروج المستخدمين</p>
      
      <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 15px;">
        <div class="form-group">
          <label>تفعيل الصيانة</label>
          <div style="display: flex; align-items: center; gap: 10px;">
            <input type="checkbox" id="maintenanceToggle" style="width: 20px; height: 20px; cursor: pointer;">
            <span id="maintenanceStatus" style="color: #ff0000;">❌ معطلة</span>
          </div>
        </div>
        <div class="form-group">
          <label>مدة الصيانة (بالساعات)</label>
          <input type="number" id="maintenanceDuration" min="0.5" max="24" step="0.5" value="1">
        </div>
        <div class="form-group">
          <label>الإجراء</label>
          <button class="btn btn-gold" onclick="applyMaintenanceMode()" style="width: 100%; margin-top: 8px;">💾 تطبيق</button>
        </div>
      </div>
    </div>

    <div class="main-grid">
      <div>
        <div class="card">
          <div class="card-title">👤 إضافة مستخدم</div>
          <div class="form-group"><label>اسم المستخدم</label><input type="text" id="newUsername"></div>
          <div class="form-group"><label>كلمة المرور</label><input type="password" id="newPassword"></div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="form-group"><label>البوتات</label><input type="number" id="maxServers" value="1"></div>
            <div class="form-group"><label>الأيام</label><input type="number" id="expiryDays" value="30"></div>
          </div>
          <button class="btn btn-gold" onclick="createUser()">✅ إنشاء الحساب</button>
        </div>

        <div class="card">
            <div class="card-title">⚙️ إعدادات الـ APIs</div>
            <div class="form-group"><label>رابط قائمة الأصدقاء</label><input type="text" id="api_list_friends"></div>
            <div class="form-group"><label>رابط إضافة صديق</label><input type="text" id="api_add_friend"></div>
            <div class="form-group"><label>رابط حذف صديق</label><input type="text" id="api_remove_friend"></div>
            <div class="form-group"><label>رابط طلب الكلان</label><input type="text" id="api_request_clan"></div>
            <button class="btn btn-gold" onclick="saveApiConfig()">💾 حفظ الإعدادات</button>
        </div>
      </div>

      <div class="card">
        <div class="card-title">👥 إدارة الحسابات</div>
        <div class="users-list" id="usersList">
          <!-- Users loaded here -->
        </div>
      </div>
    </div>
  </div>

  <!-- Update User Modal -->
  <div id="updateModal" class="modal">
    <div class="modal-content">
      <span class="close-btn" onclick="closeUpdateModal()">✕</span>
      <h2 style="color: var(--gold); margin-bottom: 20px; font-size: 1.2rem;">تعديل: <span id="updateTargetUser"></span></h2>
      <div class="form-group"><label>إضافة أيام اشتراك</label><input type="number" id="updateAddDays" value="0"></div>
      <div class="form-group"><label>إضافة عدد بوتات</label><input type="number" id="updateAddBots" value="0"></div>
      <button class="btn btn-gold" onclick="confirmUpdate()">💾 حفظ التعديلات</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    let currentUpdateUser = '';

    async function loadStats() {
      const res = await fetch('/api/admin/stats');
      const stats = await res.json();
      document.getElementById('totalUsers').textContent = stats.total_users;
      document.getElementById('runningServers').textContent = stats.running_servers;
      document.getElementById('storageMB').textContent = stats.storage_mb + ' MB';
      document.getElementById('cpuUsage').textContent = stats.cpu_usage + '%';
    }

    async function loadApiConfig() {
        const res = await fetch('/api/admin/api_config');
        const config = await res.json();
        document.getElementById('api_list_friends').value = config.list_friends || '';
        document.getElementById('api_add_friend').value = config.add_friend || '';
        document.getElementById('api_remove_friend').value = config.remove_friend || '';
        document.getElementById('api_request_clan').value = config.request_clan || '';
    }

    async function saveApiConfig() {
        const config = {
            list_friends: document.getElementById('api_list_friends').value,
            add_friend: document.getElementById('api_add_friend').value,
            remove_friend: document.getElementById('api_remove_friend').value,
            request_clan: document.getElementById('api_request_clan').value
        };
        const res = await fetch('/api/admin/api_config', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(config)
        });
        if (res.ok) Swal.fire({ icon: 'success', title: 'تم الحفظ', text: 'تم تحديث روابط API بنجاح', timer: 1500, showConfirmButton: false });
    }

    async function loadUsers() {
      const res = await fetch('/api/admin/users');
      const users = await res.json();
      const list = document.getElementById('usersList');
      list.innerHTML = users.map(user => `
        <div class="user-item">
          <div>
            <div class="user-name">${user.username}</div>
            <div class="user-meta">
              🖥️ ${user.max_bots} بوت | 📅 ينتهي: ${new Date(user.expires_at).toLocaleDateString('ar-EG')}
            </div>
          </div>
          <div class="action-group">
            <button class="btn-action" onclick="openUpdateModal('${user.username}')">✏️ تعديل</button>
            <button class="btn-action danger" onclick="deleteUser('${user.username}')">🗑️ حذف</button>
          </div>
        </div>
      `).join('');
    }

    function openUpdateModal(username) {
        currentUpdateUser = username;
        document.getElementById('updateTargetUser').textContent = username;
        document.getElementById('updateModal').style.display = 'block';
    }

    function closeUpdateModal() {
        document.getElementById('updateModal').style.display = 'none';
    }

    async function confirmUpdate() {
        const add_days = document.getElementById('updateAddDays').value;
        const add_bots = document.getElementById('updateAddBots').value;
        const res = await fetch('/api/admin/users/update', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: currentUpdateUser, add_days, add_bots })
        });
        if (res.ok) {
            Swal.fire({ icon: 'success', title: 'تم التحديث', text: 'تم تعديل بيانات المستخدم بنجاح', timer: 1500, showConfirmButton: false });
            closeUpdateModal();
            loadUsers();
        }
    }

    async function createUser() {
      const username = document.getElementById('newUsername').value.trim();
      const password = document.getElementById('newPassword').value.trim();
      const max_bots = document.getElementById('maxServers').value;
      const days = document.getElementById('expiryDays').value;

      if (!username || !password) return Swal.fire({ icon: 'warning', title: 'تنبيه', text: 'يرجى ملء جميع الحقول' });

      try {
        const r = await fetch('/api/admin/users/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, max_bots, days })
        });
        const data = await r.json();
        if (data.success) {
          Swal.fire({ icon: 'success', title: 'تم!', text: data.message || 'تم إنشاء المستخدم بنجاح', timer: 1500, showConfirmButton: false });
          document.getElementById('newUsername').value = '';
          document.getElementById('newPassword').value = '';
          loadUsers();
          loadStats();
        } else {
          Swal.fire({ icon: 'error', title: 'خطأ', text: data.message || data.error || 'فشل إنشاء المستخدم' });
        }
      } catch (e) { 
        console.error(e);
        Swal.fire({ icon: 'error', title: 'خطأ', text: 'حدث خطأ أثناء الاتصال بالخادم' });
      }
    }

    async function deleteUser(username) {
      const result = await Swal.fire({
        title: 'حذف المستخدم؟',
        text: `سيتم إيقاف وحذف جميع سيرفرات ${username} نهائياً!`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'نعم، احذف الكل',
        cancelButtonText: 'إلغاء'
      });

      if (result.isConfirmed) {
        try {
          const r = await fetch('/api/admin/users/delete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username })
          });
          const data = await r.json();
          if (data.success) {
            Swal.fire({ icon: 'success', title: 'تم الحذف', text: 'تم تنظيف بيانات المستخدم بالكامل', timer: 1500, showConfirmButton: false });
            loadUsers();
            loadStats();
          } else {
            Swal.fire({ icon: 'error', title: 'خطأ', text: data.message || 'فشل حذف المستخدم' });
          }
        } catch (e) {
          console.error(e);
          Swal.fire({ icon: 'error', title: 'خطأ', text: 'حدث خطأ أثناء الاتصال بالخادم' });
        }
      }
    }

    function logout() { window.location.href = '/api/logout'; }

    window.onload = () => { loadStats(); loadUsers(); loadApiConfig(); };
    setInterval(loadStats, 5000);
  </script>





<!-- Audio Control Script Start -->
<script>
(function() {
    if (window.audioControlInitialized) return;
    window.audioControlInitialized = true;

    const songs = [
        '/host/assets/bg_music.m4a',
        '/host/assets/bg_music_2.m4a'
    ];

    // Get current song index from localStorage
    let currentSongIndex = parseInt(localStorage.getItem('audioSongIndex')) || 0;
    if (currentSongIndex >= songs.length) currentSongIndex = 0;

    const audio = new Audio(songs[currentSongIndex]);
    audio.loop = true;
    audio.id = 'bg-audio';

    // Container for buttons
    const container = document.createElement('div');
    container.id = 'audio-controls-container';
    container.style.cssText = 'position:fixed; top:15px; right:15px; z-index:10000; display:flex; gap:10px; align-items:center;';
    document.body.appendChild(container);

    // Helper to create buttons
    function createBtn(id, icon, title) {
        const btn = document.createElement('button');
        btn.id = id;
        btn.innerHTML = icon;
        btn.title = title;
        btn.style.cssText = 'width:35px; height:35px; border-radius:50%; border:2px solid #00d4ff; background:rgba(12, 17, 29, 0.85); color:#00d4ff; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; box-shadow:0 0 10px rgba(0, 212, 255, 0.4); transition:all 0.3s ease; backdrop-filter:blur(5px); padding:0;';
        btn.onmouseover = () => { btn.style.transform = 'scale(1.1)'; btn.style.boxShadow = '0 0 15px rgba(0, 212, 255, 0.6)'; };
        btn.onmouseout = () => { btn.style.transform = 'scale(1.0)'; btn.style.boxShadow = '0 0 10px rgba(0, 212, 255, 0.4)'; };
        return btn;
    }

    const switchBtn = createBtn('audio-switch', '🔄', 'تبديل الأغنية');
    const toggleBtn = createBtn('audio-toggle', '🔊', 'كتم/تشغيل');
    
    container.appendChild(switchBtn);
    container.appendChild(toggleBtn);

    let isMuted = localStorage.getItem('audioMuted') === 'true';
    audio.muted = isMuted;
    toggleBtn.innerHTML = isMuted ? '🔇' : '🔊';
    if (isMuted) { toggleBtn.style.color = '#ff5555'; toggleBtn.style.borderColor = '#ff5555'; }

    // Sync Time Logic
    const savedTime = localStorage.getItem('audioCurrentTime');
    if (savedTime) { audio.currentTime = parseFloat(savedTime); }

    // Save time frequently
    setInterval(() => {
        if (!audio.paused) { localStorage.setItem('audioCurrentTime', audio.currentTime); }
    }, 200);

    function startPlayback() {
        if (!isMuted) {
            audio.play().catch(() => {
                const resume = () => { 
                    if (!isMuted) audio.play(); 
                    document.removeEventListener('mousedown', resume);
                    document.removeEventListener('keydown', resume);
                    document.removeEventListener('touchstart', resume);
                };
                document.addEventListener('mousedown', resume);
                document.addEventListener('keydown', resume);
                document.addEventListener('touchstart', resume);
            });
        }
    }

    if (document.readyState === 'complete') { startPlayback(); }
    else { window.addEventListener('load', startPlayback); }

    // Toggle logic
    toggleBtn.onclick = function(e) {
        e.stopPropagation();
        isMuted = !isMuted;
        audio.muted = isMuted;
        if (!isMuted) {
            audio.play();
            toggleBtn.innerHTML = '🔊';
            toggleBtn.style.color = '#00d4ff';
            toggleBtn.style.borderColor = '#00d4ff';
        } else {
            audio.pause();
            toggleBtn.innerHTML = '🔇';
            toggleBtn.style.color = '#ff5555';
            toggleBtn.style.borderColor = '#ff5555';
        }
        localStorage.setItem('audioMuted', isMuted);
    };

    // Switch logic
    switchBtn.onclick = function(e) {
        e.stopPropagation();
        currentSongIndex = (currentSongIndex + 1) % songs.length;
        localStorage.setItem('audioSongIndex', currentSongIndex);
        localStorage.setItem('audioCurrentTime', 0); // Reset time for new song
        
        audio.src = songs[currentSongIndex];
        audio.currentTime = 0;
        if (!isMuted) {
            audio.play();
        }
        
        // Visual feedback
        switchBtn.style.transform = 'rotate(360deg)';
        setTimeout(() => { switchBtn.style.transform = 'rotate(0deg)'; }, 300);
    };
})();

    // --- Maintenance Mode Functions ---
    async function updateMaintenanceUI() {
      try {
        const res = await fetch('/api/maintenance/info');
        const info = await res.json();
        
        const toggle = document.getElementById('maintenanceToggle');
        const status = document.getElementById('maintenanceStatus');
        
        if (toggle) {
          toggle.checked = info.enabled;
          if (info.enabled) {
            status.textContent = `✅ مفعلة - المتبقي: ${info.remaining_seconds} ثانية`;
            status.style.color = '#00ff88';
          } else {
            status.textContent = '❌ معطلة';
            status.style.color = '#ff0000';
          }
        }
      } catch (err) {
        console.error('Error updating maintenance UI:', err);
      }
    }

    async function applyMaintenanceMode() {
      const enabled = document.getElementById('maintenanceToggle').checked;
      const duration = parseFloat(document.getElementById('maintenanceDuration').value);
      
      if (enabled && duration <= 0) {
        Swal.fire({ icon: 'warning', title: 'تحذير', text: 'يرجى إدخال مدة صحيحة' });
        return;
      }
      
      try {
        const res = await fetch('/api/maintenance/set', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ enabled, duration_hours: duration })
        });
        
        const data = await res.json();
        if (data.success) {
          Swal.fire({ 
            icon: 'success', 
            title: enabled ? 'تم تفعيل الصيانة' : 'تم إيقاف الصيانة', 
            text: enabled ? `الصيانة مفعلة لمدة ${duration} ساعة` : 'الموقع متاح الآن',
            showConfirmButton: false, 
            timer: 1500 
          });
          
          updateMaintenanceUI();
        } else {
          Swal.fire({ icon: 'error', title: 'خطأ', text: data.error || 'فشل تحديث الصيانة' });
        }
      } catch (err) {
        console.error('Error setting maintenance:', err);
        Swal.fire({ icon: 'error', title: 'خطأ', text: 'فشل الاتصال بالسيرفر' });
      }
    }

    // تحديث واجهة الصيانة عند تحميل الصفحة
    window.addEventListener('load', () => {
      updateMaintenanceUI();
      setInterval(updateMaintenanceUI, 5000);
    });

    </script>
