<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OTMAN BOT MANAGER - لوحة التحكم</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --primary: #00d4ff;
      --primary-dark: #0099cc;
      --gradient: linear-gradient(135deg, #00d4ff 0%, #0088ff 50%, #0066cc 100%);
      --bg: #05060a;
      --card-bg: rgba(12, 17, 29, 0.85);
      --text: #ffffff;
      --text-muted: #a0aec0;
      --success: #00ff88;
      --error: #ff5555;
      --warning: #ffaa00;
    }
    
    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 50% 50%, #101827 0%, #05060a 100%);
      z-index: -2;
    }

    .bg-glow {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 20% 30%, rgba(0, 212, 255, 0.05) 0%, transparent 50%),
                  radial-gradient(circle at 80% 70%, rgba(0, 136, 255, 0.05) 0%, transparent 50%);
      z-index: -1;
      pointer-events: none;
    }
    
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 30px;
      background: rgba(12, 17, 29, 0.9);
      backdrop-filter: blur(15px);
      border-bottom: 2px solid rgba(0, 212, 255, 0.3);
      flex-shrink: 0;
      z-index: 1000;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
    }
    
    .logo {
      font-size: 24px;
      font-weight: 900;
      background: var(--gradient);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    
    .user-section { display: flex; align-items: center; gap: 20px; }
    .user-name { font-weight: 700; color: var(--primary); font-size: 15px; background: rgba(0, 212, 255, 0.1); padding: 5px 15px; border-radius: 20px; border: 1px solid rgba(0, 212, 255, 0.2); }
    
    .logout-btn {
      background: rgba(255, 85, 85, 0.1);
      border: 1px solid var(--error);
      color: var(--error);
      padding: 8px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      transition: all 0.3s;
      font-size: 13px;
    }
    .logout-btn:hover { background: var(--error); color: #fff; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 85, 85, 0.3); }
    
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 30px;
    }
    
    .stats-banner {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 35px;
    }

    .stat-card {
      background: var(--card-bg);
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      transition: 0.3s;
    }
    .stat-card:hover { border-color: var(--primary); transform: translateY(-5px); }

    .stat-label { color: var(--text-muted); font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; text-transform: uppercase; }
    .stat-value { font-size: 1.5rem; font-weight: 800; color: var(--primary); }

    .create-section {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 40px;
      border: 1px solid rgba(0, 212, 255, 0.2);
      margin-bottom: 40px;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
    }

    .section-header { text-align: center; margin-bottom: 30px; }
    .section-header h2 { font-size: 2rem; color: #fff; margin-bottom: 10px; font-weight: 800; }
    .section-header p { color: var(--text-muted); font-size: 1rem; }

    .form-group { margin-bottom: 25px; }
    .form-group label { display: block; margin-bottom: 10px; color: var(--text); font-weight: 600; font-size: 0.95rem; }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 16px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      color: #fff;
      font-family: 'Tajawal', sans-serif;
      transition: 0.3s;
      font-size: 15px;
    }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--primary); outline: none; background: rgba(0, 212, 255, 0.05); }
    
    .btn { 
      width: 100%; 
      padding: 16px; 
      border: none; 
      border-radius: 14px; 
      font-weight: 800; 
      cursor: pointer; 
      transition: 0.3s; 
      font-family: 'Tajawal', sans-serif; 
      font-size: 1.1rem; 
    }
    .btn-primary { background: var(--gradient); color: #000; }
    .btn-primary:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0, 212, 255, 0.4); }
    
    .bots-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
      gap: 25px; 
    }
    
    .bot-card { 
      background: var(--card-bg); 
      border-radius: 20px; 
      padding: 25px; 
      border: 1px solid rgba(255, 255, 255, 0.05); 
      transition: 0.4s; 
      position: relative; 
    }
    .bot-card:hover { border-color: var(--primary); transform: translateY(-8px); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5); }
    
    .bot-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .bot-title { font-size: 1.3rem; font-weight: 800; color: #fff; }
    
    .status-badge { padding: 6px 12px; border-radius: 12px; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; }
    .status-badge.running { background: rgba(0, 255, 136, 0.1); color: var(--success); border: 1px solid var(--success); }
    .status-badge.stopped { background: rgba(255, 85, 85, 0.1); color: var(--error); border: 1px solid var(--error); }
    
    .bot-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
    .action-btn { padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #fff; cursor: pointer; transition: 0.3s; font-weight: 600; font-family: 'Tajawal'; }
    .action-btn:hover { background: var(--primary); color: #000; border-color: var(--primary); }
    .action-btn.danger:hover { background: var(--error); color: #fff; border-color: var(--error); }

    /* Modal Styling */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 50% 50%, #0f172a 0%, #020305 100%);
      z-index: 2000;
      backdrop-filter: blur(15px);
      overflow-y: auto;
    }
    
    .modal::before {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 50% 50%, #0f172a 0%, #020305 100%);
      z-index: -1;
    }
    
    .modal-glow-orb {
      position: fixed;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(0, 212, 255, 0.1) 0%, transparent 70%);
      border-radius: 50%;
      filter: blur(60px);
      z-index: -1;
      pointer-events: none;
      animation: move 15s infinite alternate ease-in-out;
    }
    
    .modal-glow-orb-1 { top: -50px; left: -50px; }
    .modal-glow-orb-2 { bottom: -50px; right: -50px; background: radial-gradient(circle, rgba(0, 136, 255, 0.1) 0%, transparent 70%); }
    
    @keyframes move {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 30px) scale(1.1); }
    }
    
    .modal-content {
      background: var(--card-bg);
      border: 2px solid var(--primary);
      border-radius: 24px;
      width: 95%;
      max-width: 800px;
      margin: 5vh auto;
      padding: 30px;
      position: relative;
    }
    .close-btn {
      position: absolute;
      top: 15px; left: 15px;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--text-muted);
      width: 35px; height: 35px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.05); border-radius: 50%;
    }

    .tabs { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 1px solid rgba(0, 212, 255, 0.2); padding-bottom: 15px; flex-wrap: wrap; overflow-x: auto; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab { padding: 10px 20px; cursor: pointer; border-radius: 10px; transition: 0.3s; font-size: 14px; font-weight: 600; color: var(--text-muted); white-space: nowrap; }
    .tab.active { background: var(--primary); color: #000; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Prefix Selector */
    .prefix-selector { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
    .prefix-btn { flex: 1; min-width: 45px; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(0, 212, 255, 0.2); border-radius: 8px; color: #fff; cursor: pointer; font-weight: 800; font-size: 1.2rem; transition: 0.3s; }
    .prefix-btn.active { background: var(--primary); color: #000; border-color: var(--primary); box-shadow: 0 0 15px var(--primary); }

    /* Item Cards */
    .item-card { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 10px; }
    .item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .item-label { color: var(--primary); font-weight: 800; font-size: 0.9rem; }
    
    /* System Messages Grid */
    .sys-msg-grid { display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: 5px; }
    .sys-msg-item { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); padding: 8px 12px; border-radius: 8px; font-size: 0.8rem; }
    .edit-icon-btn { background: none; border: none; color: var(--primary); cursor: pointer; font-size: 0.9rem; padding: 4px; }

    /* Responsive Commands List */
    #commandsList { display: flex; flex-direction: column; gap: 10px; }

    .log-area { background: #000; color: #00ff00; font-family: monospace; padding: 15px; border-radius: 12px; height: 300px; overflow-y: auto; white-space: pre-wrap; font-size: 0.8rem; border: 1px solid rgba(0, 255, 136, 0.2); }

    .expiry-badge { padding: 2px 8px; border-radius: 5px; font-size: 0.75rem; font-weight: bold; margin-right: 10px; }
    .expiry-green { background: rgba(0, 255, 136, 0.2); color: var(--success); border: 1px solid var(--success); }
    .expiry-yellow { background: rgba(255, 170, 0, 0.2); color: var(--warning); border: 1px solid var(--warning); }
    .expiry-red { background: rgba(255, 85, 85, 0.2); color: var(--error); border: 1px solid var(--error); }
    
    .swal2-popup { border-radius: 25px !important; background: #0f172a !important; color: #fff !important; border: 1px solid rgba(0, 212, 255, 0.2) !important; }
    .swal2-title { color: #fff !important; }
    .swal2-html-container { color: var(--text-muted) !important; }
    .swal2-confirm { background: var(--gradient) !important; color: #000 !important; font-weight: bold !important; border-radius: 10px !important; }
    .swal2-cancel { background: rgba(255,255,255,0.1) !important; color: #fff !important; border-radius: 10px !important; }
    .swal2-textarea { background: rgba(0,0,0,0.3) !important; color: #fff !important; border: 1px solid rgba(255,255,255,0.1) !important; border-radius: 14px !important; }
    .swal2-textarea:focus { border-color: var(--primary) !important; box-shadow: none !important; }

    /* Friends Tab Styling */
    .friends-info-card { background: rgba(0, 212, 255, 0.05); border: 1px solid var(--primary); border-radius: 15px; padding: 15px; margin-bottom: 20px; }
    .friends-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .friends-info-item { font-size: 0.9rem; }
    .friends-info-label { color: var(--text-muted); margin-left: 5px; }
    .friends-info-value { color: var(--primary); font-weight: bold; }
    
    .friends-action-box { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
    .friends-action-box input { width: 100%; box-sizing: border-box; }
    .friends-action-box .btn { width: 100%; }
    .friends-list-container { max-height: 400px; overflow-y: auto; margin-top: 20px; }
    .friend-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.05); }
    .friend-name { font-weight: bold; color: #fff; }
    .friend-uid { font-size: 0.8rem; color: var(--text-muted); }
    
    .blink-red { animation: blinker 1s linear infinite; color: #ff5555; font-weight: bold; text-align: center; padding: 20px; font-size: 1.2rem; }
    @keyframes blinker { 50% { opacity: 0; } }
    
    .loading-spinner { border: 4px solid rgba(255, 255, 255, 0.1); border-left-color: var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="topbar">
    <div class="logo">oTman Manager</div>
    <div class="user-section">
      <div class="user-name" id="userNameDisplay">...</div>
      <button class="logout-btn" onclick="location.href='/api/logout'">تسجيل الخروج</button>
    </div>
  </div>

  <div class="main-content">
    <div class="stats-banner">
      <div class="stat-card"><div class="stat-label">🤖 البوتات النشطة</div><div class="stat-value" id="activeBots">0 / 0</div></div>
      <div class="stat-card"><div class="stat-label">⏱️ الوقت المتبقي</div><div class="stat-value" id="expiryDisplay">...</div></div>
    </div>

    <div class="create-section">
      <div class="section-header"><h2>🚀 إنشاء بوت جديد</h2><p>ابدأ رحلتك الآن وقم بإنشاء بوتك الخاص</p></div>
      <div class="form-group"><label>اسم البوت (بالإنجليزي)</label><input type="text" id="newBotName" placeholder="مثلاً: my-bot-01"></div>
      <div class="form-group" style="display: flex; gap: 15px; align-items: flex-end;">
        <div style="flex: 1;"><label>كابتشا الحماية</label><input type="number" id="captchaAnswer" placeholder="الناتج؟"></div>
        <div id="captchaBox" style="background: rgba(0,212,255,0.1); border: 1px solid var(--primary); padding: 12px 25px; border-radius: 14px; font-weight: 800; color: var(--primary); font-size: 1.2rem;">...</div>
      </div>
      <button class="btn btn-primary" onclick="createBot()">🚀 إطلاق البوت الآن</button>
    </div>

    <div class="section-header"><h2>بوتاتك الحالية</h2></div>
    <div class="bots-grid" id="botsGrid"></div>
  </div>

  <div id="botModal" class="modal">
    <div class="modal-glow-orb modal-glow-orb-1"></div>
    <div class="modal-glow-orb modal-glow-orb-2"></div>
    <div class="modal-content">
      <span class="close-btn" onclick="closeModal()">×</span>
      <h2 id="modalBotTitle" style="margin-bottom: 20px; color: var(--primary);">إدارة البوت</h2>
      
      <div class="tabs">
        <div class="tab active" onclick="showTab('config')">⚙️ الإعدادات</div>
        <div class="tab" onclick="showTab('commands')">⌨️ الأوامر</div>
        <div class="tab" onclick="showTab('messages')">💬 الرسائل</div>
        <div class="tab" onclick="showTab('system')">🖥️ رسائل النظام</div>
        <div class="tab" onclick="showTab('friends')">👥 إدارة الأصدقاء</div>
        <div class="tab" onclick="showTab('logs')">📜 السجلات</div>
      </div>

      <div id="tab-config" class="tab-content active">
        <div class="form-group"><label>UID الحساب</label><input type="text" id="cfg_account_uid"></div>
        <div class="form-group"><label>كلمة السر</label><input type="password" id="cfg_account_password"></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
          <div class="form-group"><label>اسم البوت</label><input type="text" id="cfg_bot_name"></div>
          <div class="form-group"><label>اسم المالك</label><input type="text" id="cfg_owner_name"></div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
          <div class="form-group"><label>تيليجرام المالك</label><input type="text" id="cfg_owner_tg"></div>
          <div class="form-group"><label>UID الأدمن</label><input type="text" id="cfg_admin_uid"></div>
        </div>
        <button class="btn btn-primary" onclick="saveConfig()">💾 حفظ الإعدادات</button>
      </div>

      <div id="tab-commands" class="tab-content">
        <label style="display: block; margin-bottom: 10px; font-weight: bold; color: var(--primary);">اختر بادئة الأوامر:</label>
        <div class="prefix-selector" id="prefixSelector"></div>
        <div id="commandsList"></div>
        <button class="btn btn-primary" style="margin-top: 20px;" onclick="saveCommands()">💾 حفظ الأوامر</button>
      </div>

      <div id="tab-messages" class="tab-content">
        <div id="messagesList"></div>
      </div>

      <div id="tab-system" class="tab-content">
        <div class="item-card" style="border: 2px solid var(--warning); background: rgba(255, 170, 0, 0.05);">
          <div class="item-header"><span class="item-label" style="color: var(--warning);">⏳ رسالة الانتظار العامة</span></div>
          <div class="sys-msg-grid">
            <div class="sys-msg-item">
              <span class="sys-msg-text" id="global_wait_text" style="max-width: 80%;">تحميل...</span>
              <button class="edit-icon-btn" onclick="editMsg('system_messages', 'global_wait')">⚙️ تعديل</button>
            </div>
          </div>
        </div>
        <div id="systemMessagesList"></div>
      </div>

      <div id="tab-friends" class="tab-content">
        <div id="friends-container">
          <!-- سيتم تحميل المحتوى هنا برمجياً -->
        </div>
      </div>

      <div id="tab-logs" class="tab-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
          <button class="btn" style="width: auto; padding: 5px 15px; font-size: 12px; background: var(--primary); color: #000;" onclick="refreshLogs()">🔄 تحديث</button>
          <button class="btn" style="width: auto; padding: 5px 15px; font-size: 12px; background: var(--success); color: #000;" onclick="copyLogs()">📋 نسخ السجلات</button>
        </div>
        <div class="log-area" id="logArea">تحميل...</div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    let currentBotFolder = '', currentConfig = {}, captchaResult = 0;
    const ALL_COMMANDS = ['Admin', 'like', 'friends', 'sp_clan', 'attack', 'stop_attack', 'mk', 'stop_mk', 'ghost', 'lag_ghost', 'msg', 'spam', 'stop_spam', 'emote', 'solo', 'help'];
    const SYS_MSG_COMMANDS = ['like', 'friends', 'sp_clan', 'attack', 'stop_attack', 'mk', 'stop_mk', 'ghost', 'lag_ghost', 'msg', 'spam', 'stop_spam', 'emote', 'solo'];

    function showSwal(options) {
      return Swal.fire({
        ...options,
        target: document.getElementById('botModal').style.display === 'block' ? '#botModal' : 'body',
        didOpen: (modal) => {
          const input = modal.querySelector('textarea');
          if (input) {
            input.blur();
          }
        }
      });
    }

    async function loadUserInfo() {
      const r = await fetch('/api/user/info'), d = await r.json();
      if (d.username) {
        document.getElementById('userNameDisplay').textContent = d.username;
        const exp = new Date(d.expires_at), now = new Date(), diff = exp - now;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24)), hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        document.getElementById('expiryDisplay').innerHTML = `<span class="expiry-badge ${days > 7 ? 'expiry-green' : (days > 2 ? 'expiry-yellow' : 'expiry-red')}">${days} يوم و ${hours} ساعة</span>`;
        loadBots();
      } else location.href = '/login';
    }

    function generateCaptcha() {
      const a = Math.floor(Math.random() * 15) + 1, b = Math.floor(Math.random() * 10) + 1;
      captchaResult = a + b;
      document.getElementById('captchaBox').textContent = `${a} + ${b} = ?`;
      document.getElementById('captchaAnswer').value = '';
    }

    async function loadBots() {
      const r = await fetch('/api/bots/list'), bots = await r.json();
      let active = 0;
      document.getElementById('botsGrid').innerHTML = bots.map(b => {
        if (b.status === 'running') active++;
        return `
          <div class="bot-card">
            <div class="bot-header"><div class="bot-title">${b.folder}</div><div class="status-badge ${b.status}">${b.status === 'running' ? 'متصل' : 'متوقف'}</div></div>
            <div class="bot-actions">
              <button class="action-btn" onclick="toggleBot('${b.folder}', '${b.status}')">${b.status === 'running' ? '🛑 إيقاف' : '⚡ تشغيل'}</button>
              <button class="action-btn" onclick="openManage('${b.folder}')">⚙️ إدارة</button>
              <button class="action-btn danger" style="grid-column: span 2;" onclick="deleteBot('${b.folder}')">🗑️ حذف نهائياً</button>
            </div>
          </div>
        `;
      }).join('');
      document.getElementById('activeBots').textContent = `${active} / ${bots.length || 0}`;
    }

    async function openManage(f) {
      currentBotFolder = f;
      document.getElementById('modalBotTitle').textContent = `إدارة البوت: ${f}`;
      const r = await fetch(`/api/bots/config/get/${f}`);
      currentConfig = await r.json();
      
      document.getElementById('cfg_account_uid').value = currentConfig.account_uid || '';
      document.getElementById('cfg_account_password').value = currentConfig.account_password || '';
      document.getElementById('cfg_bot_name').value = currentConfig.bot_name || '';
      document.getElementById('cfg_owner_name').value = currentConfig.owner_name || '';
      document.getElementById('cfg_owner_tg').value = currentConfig.owner_telegram || '';
      document.getElementById('cfg_admin_uid').value = currentConfig.admin_uid || '';

      updatePrefixUI(currentConfig.command_prefix || '/');
      renderCommandsList();
      renderMessagesList();
      renderSystemMessagesList();
      showTab('config');
      document.getElementById('botModal').style.display = 'block';
    }

    function closeModal() { document.getElementById('botModal').style.display = 'none'; }

    function updatePrefixUI(p) {
      const prefixes = ['!', '#', '/', '*', '@'];
      document.getElementById('prefixSelector').innerHTML = prefixes.map(x => `
        <button class="prefix-btn ${x === p ? 'active' : ''}" onclick="changePrefix('${x}')">${x}</button>
      `).join('');
    }

    async function changePrefix(p) {
      const oldPrefix = currentConfig.command_prefix || '/';
      currentConfig.command_prefix = p; 
      updatePrefixUI(p);
      
      if (currentConfig.messages) {
        ['help_msg_1', 'help_msg_2', 'emoji_msg'].forEach(key => {
          if (currentConfig.messages[key]) {
            const prefixRegex = new RegExp(escapeRegExp(oldPrefix), 'g');
            currentConfig.messages[key] = currentConfig.messages[key].replace(prefixRegex, p);
          }
        });
      }
      
      if (currentConfig.commands) {
        Object.keys(currentConfig.commands).forEach(key => {
          let val = currentConfig.commands[key] || '';
          if (val) {
            const cleanVal = val.replace(/^[!#/*@]/, '');
            currentConfig.commands[key] = p + cleanVal;
          }
        });
      }

      await saveCurrentConfig();
      showSwal({ icon: 'success', title: 'تم التحديث', text: `تم تغيير البادئة إلى ${p} وتحديث الرسائل والأوامر`, timer: 2000, showConfirmButton: false }); 
      renderCommandsList(); 
      renderMessagesList();
    }

    function escapeRegExp(string) { return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

    function renderCommandsList() {
      const cmds = currentConfig.commands || {}, p = currentConfig.command_prefix || '/';
      document.getElementById('commandsList').innerHTML = ALL_COMMANDS.map(key => {
        let val = (cmds[key] || '').replace(/^[!#/*@]/, '');
        if (!val && key === 'Admin') val = 'Admin';
        return `
          <div class="item-card">
            <div class="item-header"><span class="item-label">${key}</span></div>
            <input type="text" id="cmd_${key}" value="${val}" onchange="updateCommandName('${key}', this.value)" placeholder="اسم الأمر" style="width: 100%; padding: 8px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 0.9rem;">
          </div>
        `;
      }).join('');
    }

    function updateCommandName(key, newVal) {
      const p = currentConfig.command_prefix || '/';
      const oldFullCmd = currentConfig.commands[key] || (p + key);
      const newFullCmd = p + newVal.trim();
      currentConfig.commands[key] = newFullCmd;
      
      if (currentConfig.messages) {
        ['help_msg_1', 'help_msg_2'].forEach(mKey => {
          if (currentConfig.messages[mKey]) {
            const cmdRegex = new RegExp(escapeRegExp(oldFullCmd), 'g');
            currentConfig.messages[mKey] = currentConfig.messages[mKey].replace(cmdRegex, newFullCmd);
          }
        });
      }
      renderMessagesList();
    }

    function renderMessagesList() {
      const msgs = currentConfig.messages || {};
      const keys = { 'help_msg_1': 'المساعدة 1', 'help_msg_2': 'المساعدة 2', 'admin_msg': 'رسالة الأدمن', 'emoji_msg': 'رسالة الإيموجي' };
      document.getElementById('messagesList').innerHTML = Object.entries(keys).map(([key, label]) => `
        <div class="item-card">
          <div class="item-header">
            <span class="item-label">${label}</span>
            <button class="btn" style="width: auto; padding: 5px 15px; font-size: 12px; background: var(--primary); color: #000;" onclick="editMsg('messages', '${key}')">تعديل</button>
          </div>
          <div style="font-size: 0.8rem; color: var(--text-muted); white-space: pre-wrap; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; margin-top: 10px;">${msgs[key] || 'لا توجد رسالة'}</div>
        </div>
      `).join('');
    }

    function renderSystemMessagesList() {
      const sys = currentConfig.system_messages || {};
      document.getElementById('global_wait_text').textContent = sys['global_wait'] || 'لا توجد رسالة انتظار';
      document.getElementById('systemMessagesList').innerHTML = SYS_MSG_COMMANDS.map(cmd => `
        <div class="item-card">
          <div class="item-header"><span class="item-label">أمر: ${cmd}</span></div>
          <div class="sys-msg-grid">
            <div class="sys-msg-item"><span>✅ نجاح</span><span class="sys-msg-text">${sys[cmd + '_success'] || '...'}</span><button class="edit-icon-btn" onclick="editMsg('system_messages', '${cmd}_success')">⚙️</button></div>
            <div class="sys-msg-item"><span>❌ فشل</span><span class="sys-msg-text">${sys[cmd + '_error'] || '...'}</span><button class="edit-icon-btn" onclick="editMsg('system_messages', '${cmd}_error')">⚙️</button></div>
            ${cmd === 'like' ? `<div class="sys-msg-item"><span>⚠️ حد</span><span class="sys-msg-text">${sys[cmd + '_limit'] || '...'}</span><button class="edit-icon-btn" onclick="editMsg('system_messages', '${cmd}_limit')">⚙️</button></div>` : ''}
          </div>
        </div>
      `).join('');
    }

    async function editMsg(sec, key) {
      const cur = (currentConfig[sec] || {})[key] || '';
      const { value: text } = await showSwal({ 
        title: 'تعديل الرسالة', 
        input: 'textarea', 
        inputValue: cur, 
        showCancelButton: true, 
        confirmButtonText: 'حفظ', 
        cancelButtonText: 'إلغاء',
        inputAttributes: { style: 'height: 350px; font-family: Tajawal; direction: rtl; font-size: 14px;' },
        width: '90%'
      });
      if (text !== undefined) {
        if (!currentConfig[sec]) currentConfig[sec] = {}; 
        currentConfig[sec][key] = text;
        await saveCurrentConfig();
        if (sec === 'messages') renderMessagesList(); else renderSystemMessagesList(); 
        showSwal({ icon: 'success', title: 'تم الحفظ', timer: 1000, showConfirmButton: false }); 
      }
    }

    async function saveCurrentConfig() {
      return fetch(`/api/bots/config/save/${currentBotFolder}`, { 
        method: 'POST', 
        headers: { 'Content-Type': 'application/json' }, 
        body: JSON.stringify(currentConfig) 
      });
    }

    async function saveCommands() {
      const p = currentConfig.command_prefix || '/'; currentConfig.commands = currentConfig.commands || {};
      ALL_COMMANDS.forEach(k => { 
        const v = document.getElementById(`cmd_${k}`).value.trim(); 
        if (v) currentConfig.commands[k] = p + v; 
      });
      const r = await saveCurrentConfig();
      if ((await r.json()).success) showSwal({ icon: 'success', title: 'تم حفظ الأوامر', timer: 1500, showConfirmButton: false });
      else showSwal({ icon: 'error', title: 'خطأ في الحفظ' });
    }

    async function saveConfig() {
      currentConfig.account_uid = document.getElementById('cfg_account_uid').value;
      currentConfig.account_password = document.getElementById('cfg_account_password').value;
      currentConfig.bot_name = document.getElementById('cfg_bot_name').value;
      currentConfig.owner_name = document.getElementById('cfg_owner_name').value;
      currentConfig.owner_telegram = document.getElementById('cfg_owner_tg').value;
      currentConfig.admin_uid = document.getElementById('cfg_admin_uid').value;
      const r = await saveCurrentConfig();
      if ((await r.json()).success) showSwal({ icon: 'success', title: 'تم الحفظ بنجاح', timer: 1500, showConfirmButton: false });
      else showSwal({ icon: 'error', title: 'خطأ في الحفظ' });
    }

    async function toggleBot(f, s) {
      const r = await fetch(`/api/bots/${s === 'running' ? 'stop' : 'start'}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ folder: f }) });
      if ((await r.json()).success) loadBots();
    }

    async function deleteBot(f) {
      if ((await showSwal({ title: 'حذف نهائي؟', text: `سيتم حذف "${f}" وجميع ملفاته!`, icon: 'warning', showCancelButton: true, confirmButtonText: 'نعم، احذف', cancelButtonText: 'إلغاء' })).isConfirmed) {
        const r = await fetch('/api/bots/delete', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ folder: f }) });
        if ((await r.json()).success) { loadBots(); showSwal({ icon: 'success', title: 'تم الحذف', timer: 1500, showConfirmButton: false }); }
      }
    }

    async function createBot() {
      const n = document.getElementById('newBotName').value.trim(), a = parseInt(document.getElementById('captchaAnswer').value);
      if (!n || isNaN(a) || a !== captchaResult) return showSwal({ icon: 'error', title: 'خطأ', text: 'البيانات غير مكتملة أو الكابتشا خاطئة' });
      const r = await fetch('/api/bots/create', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: n }) });
      if ((await r.json()).success) { generateCaptcha(); loadBots(); showSwal({ icon: 'success', title: 'تم!', text: 'تم إنشاء البوت بنجاح', timer: 2000, showConfirmButton: false }); }
      else showSwal({ icon: 'error', title: 'فشل الإنشاء', text: 'ربما وصلت للحد الأقصى للبوتات' });
    }

    async function refreshLogs() {
      const area = document.getElementById('logArea'); area.textContent = 'تحميل السجلات...';
      const r = await fetch(`/api/bots/logs/${currentBotFolder}`), data = await r.json();
      area.textContent = data.logs || 'لا يوجد سجلات حالياً'; area.scrollTop = area.scrollHeight;
    }

    function copyLogs() {
      const area = document.getElementById('logArea');
      navigator.clipboard.writeText(area.textContent).then(() => {
        showSwal({ icon: 'success', title: 'تم النسخ', text: 'تم نسخ السجلات إلى الحافظة', timer: 1500, showConfirmButton: false });
      });
    }

    function showTab(t) {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
      const tabBtn = document.querySelector(`.tab[onclick*="'${t}'"]`);
      if (tabBtn) tabBtn.classList.add('active');
      const content = document.getElementById(`tab-${t}`);
      if (content) content.classList.add('active');
      if (t === 'logs') refreshLogs();
      if (t === 'friends') loadFriendsTab();
    }

    // كاش بيانات تبويب الأصدقاء - يُحفظ لكل بوت على حدة
    const friendsTabCache = {};

    function renderFriendsTab(data) {
      const container = document.getElementById('friends-container');
      const myInfo = data.my_info || {};
      const accInfo = data.account_info || {};
      const friends = data.friends_list || [];

      container.innerHTML = `
        <div class="friends-info-card">
          <div class="friends-info-grid">
            <div class="friends-info-item"><span class="friends-info-label">الاسم:</span> <span class="friends-info-value">${myInfo.name || 'غير معروف'}</span></div>
            <div class="friends-info-item"><span class="friends-info-label">UID:</span> <span class="friends-info-value">${myInfo.uid || 'غير معروف'}</span></div>
            <div class="friends-info-item"><span class="friends-info-label">المنطقة:</span> <span class="friends-info-value">${accInfo.region || 'غير معروف'}</span></div>
            <div class="friends-info-item"><span class="friends-info-label">الأصدقاء:</span> <span class="friends-info-value">${data.friends_count || 0}</span></div>
          </div>
        </div>

        <div class="item-card">
          <div class="item-header"><span class="item-label">إدارة الكلان</span></div>
          <div class="friends-action-box">
            <input type="text" id="clan_id_input" placeholder="أدخل ايدي الكلان" style="padding:10px; background:rgba(0,0,0,0.2); border:1px solid rgba(255,255,255,0.1); border-radius:8px; color:#fff;">
            <button class="btn" style="padding:10px 20px; background:var(--primary); color:#000;" onclick="sendClanRequest()">إرسال طلب</button>
          </div>
        </div>

        <div class="item-card">
          <div class="item-header"><span class="item-label">إضافة صديق</span></div>
          <div class="friends-action-box">
            <input type="text" id="friend_id_input" placeholder="أدخل ايدي الشخص" style="padding:10px; background:rgba(0,0,0,0.2); border:1px solid rgba(255,255,255,0.1); border-radius:8px; color:#fff;">
            <button class="btn" style="padding:10px 20px; background:var(--primary); color:#000;" onclick="sendFriendRequest()">إرسال طلب</button>
          </div>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:20px;">
          <h3 style="color:var(--primary);">قائمة الأصدقاء</h3>
          <button class="btn" style="width:auto; padding:5px 15px; font-size:12px; background:rgba(0,212,255,0.1); color:var(--primary); border:1px solid var(--primary);" onclick="refreshFriendsTab()">🔄 تحديث</button>
        </div>

        <div class="friends-list-container">
          ${friends.length > 0 ? friends.map(f => `
            <div class="friend-item">
              <div>
                <div class="friend-name">${f.name}</div>
                <div class="friend-uid">${f.uid}</div>
              </div>
              <button class="btn" style="width:auto; padding:5px 15px; font-size:12px; background:rgba(255,85,85,0.1); color:var(--error); border:1px solid var(--error);" onclick="removeFriend('${f.uid}', '${f.name}')">🗑️ حذف</button>
            </div>
          `).join('') : '<div style="text-align:center; color:var(--text-muted); padding:20px;">لا يوجد أصدقاء حالياً</div>'}
        </div>
      `;
    }

    async function loadFriendsTab() {
      const container = document.getElementById('friends-container');
      const uid = currentConfig.account_uid;
      const pwd = currentConfig.account_password;

      if (!uid || !pwd) {
        container.innerHTML = `<div class="blink-red">يرجى وضع الايدي و الباسورد الخاص بي حسابك الضيف في مكانهم و الضغط على حفظ من ثما عدل لي هنا</div>`;
        return;
      }

      // إذا في كاش محفوظ لهذا البوت، اعرضه مباشرة بدون جلب من الخادم
      if (friendsTabCache[currentBotFolder]) {
        renderFriendsTab(friendsTabCache[currentBotFolder]);
        return;
      }

      // أول مرة: جلب البيانات من الخادم
      container.innerHTML = `<div class="loading-spinner"></div><div style="text-align:center; color:var(--primary);">جاري تحميل البيانات...</div>`;

      try {
        const r = await fetch(`/api/proxy/bot/friends?folder=${currentBotFolder}`);
        const data = await r.json();

        if (data.status === 'success') {
          // حفظ البيانات في الكاش
          friendsTabCache[currentBotFolder] = data;
          renderFriendsTab(data);
        } else {
          container.innerHTML = `<div class="blink-red">فشل جلب البيانات، تأكد من صحة الايدي والباسورد</div>`;
        }
      } catch (e) {
        container.innerHTML = `<div class="blink-red">حدث خطأ أثناء الاتصال بالخادم</div>`;
      }
    }

    // دالة التحديث اليدوي: تمسح الكاش وتجلب من الخادم
    async function refreshFriendsTab() {
      delete friendsTabCache[currentBotFolder];
      await loadFriendsTab();
    }

    async function sendClanRequest() {
      const clanId = document.getElementById('clan_id_input').value.trim();
      if (!clanId) return showSwal({ icon: 'error', title: 'خطأ', text: 'يرجى إدخال ايدي الكلان' });
      
      showSwal({ title: 'جاري الإرسال...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
      
      try {
        const r = await fetch(`/api/bots/clan/request/${currentBotFolder}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ clan_id: clanId })
        });
        const data = await r.json();
        if (data.success) {
          showSwal({ icon: 'success', title: 'نجاح', text: 'تم ارسال طلب الانظمام للكلان بنجاح' });
        } else {
          showSwal({ icon: 'error', title: 'فشل', text: data.message || 'حدث خطأ ما' });
        }
      } catch (e) {
        showSwal({ icon: 'error', title: 'خطأ', text: 'فشل الاتصال بالخادم' });
      }
    }

    async function sendFriendRequest() {
      const friendId = document.getElementById('friend_id_input').value.trim();
      if (!friendId) return showSwal({ icon: 'error', title: 'خطأ', text: 'يرجى إدخال ايدي الشخص' });
      
      showSwal({ title: 'جاري الإرسال...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
      
      try {
        const r = await fetch(`/api/proxy/bot/add_friend`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ folder: currentBotFolder, friend_id: friendId })
        });
        const data = await r.json();
        if (data.status === 'success') {
          showSwal({ icon: 'success', title: 'نجاح', text: 'تم إرسال طلب الصداقة بنجاح' });
        } else {
          showSwal({ icon: 'error', title: 'فشل', text: 'فشل إرسال طلب الصداقة' });
        }
      } catch (e) {
        showSwal({ icon: 'error', title: 'خطأ', text: 'فشل الاتصال بالخادم' });
      }
    }

    async function removeFriend(uid, name) {
      const result = await showSwal({
        title: 'هل أنت متأكد؟',
        text: `هل تريد حقاً حذف الصديق "${name}"؟`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'نعم، حذف',
        cancelButtonText: 'إلغاء'
      });

      if (result.isConfirmed) {
        showSwal({ title: 'جاري الحذف...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
        try {
          const r = await fetch(`/api/proxy/bot/remove_friend`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ folder: currentBotFolder, friend_id: uid })
          });
          const data = await r.json();
          if (data.status === 'success') {
            showSwal({ icon: 'success', title: 'تم الحذف', text: 'تم حذف اللاعب من قائمة الأصدقاء بنجاح', timer: 2000, showConfirmButton: false });
            refreshFriendsTab();
          } else {
            showSwal({ icon: 'error', title: 'فشل', text: 'فشل حذف الصديق' });
          }
        } catch (e) {
          showSwal({ icon: 'error', title: 'خطأ', text: 'فشل الاتصال بالخادم' });
        }
      }
    }

    window.onload = () => { loadUserInfo(); generateCaptcha(); };
  </script>
</body>
</html>
